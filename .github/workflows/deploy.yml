name: CI/CD Deployment

on:
  push:
    branches:
      - master
      - production

jobs:
  build-and-verify:
    name: Build & Verify Project
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Backend Checks
      - name: Install & Build Backend
        run: |
          cd backend
          npm install
          npm run build

      # Frontend Checks
      - name: Install & Build Frontend
        run: |
          npm install
          npm run build

  deploy-test:
    name: Deploy to Test VPS
    needs: build-and-verify
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    environment: test
    steps:
      - name: SSH and Pull Code (Test)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
            cd /root/Chewe-Project
            # Discard local modifications
            git reset --hard
            git clean -fd
            # Fetch and check out master
            git fetch origin
            git checkout master
            git pull origin master
            # Build and restart backend
            cd backend
            npm install
            npm run build
            pm2 restart chewe-backend
            # Build and restart frontend
            cd ..
            npm install
            npm run build
            pm2 restart chewe-frontend
            pm2 save

  deploy-production:
    name: Deploy to Production VPS
    needs: build-and-verify
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/production'
    environment: production
    steps:
      - name: SSH and Pull Code (Production)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
            cd /root/Chewe-Project
            # Discard local modifications
            git reset --hard
            git clean -fd
            # Fetch and check out production
            git fetch origin
            git checkout production || git checkout -b production origin/production
            git pull origin production
            # Build and restart backend
            cd backend
            npm install
            npm run build
            pm2 restart chewe-backend
            # Build and restart frontend
            cd ..
            npm install
            npm run build
            pm2 restart chewe-frontend
            pm2 save
