# HTTP - Redirect all traffic to HTTPS (except certbot acme challenges)
server {
    listen 80;
    server_name ct.chewetechnologies.co.zw;

    # Let's Encrypt ACME challenge directory
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS - Reverse Proxy for Frontend (Port 443)
server {
    listen 443 ssl;
    server_name ct.chewetechnologies.co.zw;

    # SSL configuration (Certbot will manage/reference these)
    ssl_certificate /etc/letsencrypt/live/ct.chewetechnologies.co.zw/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ct.chewetechnologies.co.zw/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Proxy to PM2 Frontend process (assumed port 5173, adjust if using different port or vite preview port 4173)
    location / {
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# HTTPS - Reverse Proxy for NestJS Backend (Port 3000)
server {
    listen 3000 ssl;
    server_name ct.chewetechnologies.co.zw;

    # Reuse same SSL certificate files
    ssl_certificate /etc/letsencrypt/live/ct.chewetechnologies.co.zw/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ct.chewetechnologies.co.zw/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Proxy to NestJS backend process on port 3000
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
