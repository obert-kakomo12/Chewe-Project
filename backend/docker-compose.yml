version: '3.8'
services:
  mysql-db:
    image: mysql:8.0
    container_name: ct_project_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ct_project_db
      MYSQL_USER: ct_user
      MYSQL_PASSWORD: ct_password
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
