<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 60" fill="none">
  <!-- Shield body -->
  <path d="M14 6 L28 2 L42 6 L42 26 Q42 38 28 44 Q14 38 14 26 Z"
        fill="#1d4ed8" opacity="0.15" stroke="#1d4ed8" stroke-width="1.5"/>
  <!-- Shield inner accent -->
  <path d="M18 9 L28 6 L38 9 L38 25 Q38 34 28 39 Q18 34 18 25 Z"
        fill="#1d4ed8" opacity="0.25"/>
  <!-- Pulse line on shield -->
  <polyline points="19,24 22,24 24,18 26,30 28,20 30,28 32,22 35,22 37,22"
            stroke="#1d4ed8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- CT wordmark -->
  <text x="52" y="28"
        font-family="'Inter','Segoe UI',Arial,sans-serif"
        font-size="22" font-weight="800"
        letter-spacing="-0.5"
        fill="#0d1f45">CT</text>

  <!-- Tech wordmark -->
  <text x="52" y="44"
        font-family="'Inter','Segoe UI',Arial,sans-serif"
        font-size="11" font-weight="600"
        letter-spacing="3"
        fill="#1d4ed8">TECH</text>

  <!-- Divider line -->
  <line x1="88" y1="10" x2="88" y2="50" stroke="#d1ddef" stroke-width="1"/>

  <!-- Pulse wordmark -->
  <text x="97" y="28"
        font-family="'Inter','Segoe UI',Arial,sans-serif"
        font-size="18" font-weight="700"
        letter-spacing="-0.3"
        fill="#0d1f45">Pulse</text>

  <!-- Tagline -->
  <text x="97" y="42"
        font-family="'Inter','Segoe UI',Arial,sans-serif"
        font-size="7.5" font-weight="500"
        letter-spacing="1.2"
        fill="#4a6080">ACADEMIC INTELLIGENCE</text>

  <!-- Live dot -->
  <circle cx="208" cy="12" r="5" fill="#1d4ed8" opacity="0.2"/>
  <circle cx="208" cy="12" r="3" fill="#1d4ed8"/>
</svg>
